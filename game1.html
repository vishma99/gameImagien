<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic Gift Reveal - Stylish Hover Board</title>
    <style>
      :root {
        --primary-red: #d32f2f;
        --bright-red: #ff1744;
        --dark-cell: #000000;
        --light-cell: #ffffff;
        --gold: #ffc107;
        --active: #ff0000;
        --table-bg: rgba(10, 10, 10, 0.98);
        --standard-size: 37.5vh;
        --cell-size: calc((var(--standard-size) / 6) + 0.5vh);
      }

      body {
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: black;
        color: white;
        text-align: center;
        margin: 0;
        padding: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
      }

      #video-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: fill;
        z-index: -2;
        transition: opacity 0.5s ease;
      }

      .video-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: -1;
      }

      #falling-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 2000;
      }

      .particle {
        position: absolute;
        top: -100px;
        background-size: contain;
        background-repeat: no-repeat;
        filter: drop-shadow(2px 5px 10px rgba(0, 0, 0, 0.7));
        animation: fall linear forwards;
        opacity: 0.95;
      }

      @keyframes fall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) rotate(360deg);
          opacity: 0;
        }
      }

      .header-container {
        position: absolute;
        top: 15vh;
        width: 100%;
      }
      h1 {
        font-size: 4vh;
        margin: 0;
        color: var(--primary-red);
        text-shadow: 2px 2px 10px black;
      }

      /* --- UPDATED BOARD STYLE ---  hi */
      .board {
        display: grid;
        grid-template-columns: repeat(6, var(--cell-size));
        grid-template-rows: repeat(6, calc(var(--standard-size) / 6));
        gap: 8px;
        padding: 20px;
        width: fit-content;
        border: 2vh solid var(--primary-red);
        box-shadow: 0 0 60px rgba(211, 47, 47, 0.3);
        background-color: #1a1a1a;
        border-radius: 20px;
        position: relative;
      }

      .cell {
        width: var(--cell-size);
        height: calc(var(--standard-size) / 6);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 2.8vh;
        font-weight: bold;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
      }

      .cell.light {
        background-color: var(--light-cell);
        color: #000;
      }
      .cell.dark {
        background-color: var(--dark-cell);
        color: #fff;
      }

      /* --- HOVER EFFECT ADDED --- */
      .cell:hover {
        background-color: var(--bright-red) !important;
        color: white !important;
        transform: scale(1.15);
        z-index: 10;
        box-shadow: 0 0 25px var(--bright-red);
        border-color: white;
      }

      .cell.highlight {
        background-color: var(--active) !important;
        color: white !important;
        transform: scale(1.1);
        z-index: 5;
        box-shadow: 0 0 15px var(--active);
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background: #1a1a1a;
        color: white;
        width: var(--standard-size);
        height: var(--standard-size);
        padding: 2vh;
        border-radius: 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border: 6px solid var(--primary-red);
        box-shadow: 0 0 50px rgba(211, 47, 47, 0.8);
        z-index: 1100;
      }

      .open-btn,
      .refresh-btn {
        position: relative;
        border: none;
        padding: 1.5vh 4vh;
        margin-top: 2vh;
        font-size: 2.2vh;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: white;
        cursor: pointer;
        border-radius: 50px;
        background: linear-gradient(45deg, var(--primary-red), #ff5252);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
        overflow: hidden;
        outline: none;
      }

      .open-btn:hover,
      .refresh-btn:hover {
        transform: scale(1.05) translateY(-3px);
        box-shadow: 0 8px 25px rgba(255, 82, 82, 0.4);
      }

      .reward-img {
        width: 18vh;
        height: 18vh;
        object-fit: contain;
        border-radius: 15px;
        border: 3px solid var(--primary-red);
        background: white;
      }

      .orbit-anim {
        position: fixed;
        width: 25vh;
        z-index: 1500;
        filter: drop-shadow(0 0 20px var(--gold));
      }

      @keyframes selfRotatePulse {
        0% {
          transform: translate(-50%, -50%) rotate(0deg) scale(1);
        }
        50% {
          transform: translate(-50%, -50%) rotate(180deg) scale(1.15);
        }
        100% {
          transform: translate(-50%, -50%) rotate(360deg) scale(1);
        }
      }

      .spinning {
        animation: selfRotatePulse 2s infinite linear;
      }

      @keyframes slowOpen {
        0% {
          transform: translate(-50%, -50%) scale(1);
          filter: brightness(1);
        }
        100% {
          transform: translate(-50%, -50%) scale(3);
          opacity: 0;
        }
      }
      .opening-box {
        animation: slowOpen 2s forwards;
      }
    </style>
  </head>
  <body>
    <video autoplay muted loop id="video-bg" playsinline>
      <source src="background.mp4" type="video/mp4" />
    </video>
    <div class="video-overlay"></div>
    <div id="falling-container"></div>

    <div class="header-container">
      <h1>🎁 MAGIC GIFT BOARD 🎁</h1>
    </div>

    <div class="board" id="gameBoard"></div>

    <div id="msgModal" class="modal">
      <div id="modalInner" class="modal-content">
        <div
          id="step1"
          style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
          "
        >
          <h2
            style="
              color: var(--primary-red);
              margin: 0 0 2vh 0;
              font-size: 3.5vh;
            "
          >
            Ready to reveal?
          </h2>
          <div class="box-spotlight">
            <img
              src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png"
              style="width: 20vh"
              alt="Gift Box"
            />
          </div>
          <button class="open-btn" onclick="startCylinderRotation()">
            OPEN BOX
          </button>
        </div>
        <div
          id="step2"
          style="
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            height: 100%;
            width: 100%;
          "
        >
          <div
            id="rewardContent"
            style="
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
            "
          ></div>
          <button class="refresh-btn" onclick="location.reload()">
            PLAY AGAIN
          </button>
        </div>
      </div>
    </div>

    <img
      id="movingBox"
      src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png"
      class="orbit-anim"
      style="display: none"
    />

    <script>
      const board = document.getElementById("gameBoard");
      const modal = document.getElementById("msgModal");
      const modalInner = document.getElementById("modalInner");
      const movingBox = document.getElementById("movingBox");
      const videoBg = document.getElementById("video-bg");
      const fallingContainer = document.getElementById("falling-container");

      const getStock = (key, initial) => {
        let val = localStorage.getItem(key);
        return val === null ? initial : parseInt(val);
      };

      const setStock = (key, val) => {
        localStorage.setItem(key, val);
      };

      const rewards = [
        {
          id: "try_again",
          text: "Try Again ❌",
          img: "sad.png",
          color: "#ff0000",
          particle: "",
          prob: 50,
        },
        {
          id: "coffee",
          text: "Free Coffee ☕",
          img: "coffee.jpg",
          color: "#ff0000",
          particle: "☕",
          prob: 20,
        },
        {
          id: "cookie_1",
          text: "Win 1 Cookie 🍪",
          img: "cookie1.jpg",
          color: "#ff0000",
          particle: "🍪",
          prob: 20,
        },
        {
          id: "cookie_2",
          text: "Win 2 Cookies 🍪🍪",
          img: "cookie2.jpg",
          color: "#ff0000",
          particle: "🍪",
          prob: 10,
        },
      ];

      function pickReward() {
        let currentCoffee = getStock("stock_coffee", 250);
        let currentCookie = getStock("stock_cookie", 300);
        let rand = Math.random() * 100;
        let cumulativeProb = 0;
        let selected = rewards[0];

        for (let r of rewards) {
          cumulativeProb += r.prob;
          if (rand <= cumulativeProb) {
            selected = r;
            break;
          }
        }

        if (selected.id === "coffee" && currentCoffee <= 0) return rewards[0];
        if (selected.id === "cookie_1" && currentCookie <= 0) return rewards[0];
        if (selected.id === "cookie_2" && currentCookie < 2) return rewards[0];

        if (selected.id === "coffee")
          setStock("stock_coffee", currentCoffee - 1);
        else if (selected.id === "cookie_1")
          setStock("stock_cookie", currentCookie - 1);
        else if (selected.id === "cookie_2")
          setStock("stock_cookie", currentCookie - 2);

        return selected;
      }

      let cellsArray = [];
      const snakePath = [
        0, 1, 2, 3, 4, 5, 11, 17, 23, 29, 35, 34, 33, 32, 31, 30, 24, 18, 12, 6,
        7, 8, 9, 10, 16, 22, 28, 27, 26, 25, 19, 13, 14, 15, 21, 20,
      ];

      function createBoard() {
        for (let i = 0; i < 36; i++) {
          const cell = document.createElement("div");
          const row = Math.floor(i / 6),
            col = i % 6;
          cell.className = `cell ${(row + col) % 2 !== 0 ? "dark" : "light"}`;
          cell.innerHTML = i + 1;
          cell.onclick = () => {
            cellsArray.forEach((c) => (c.style.pointerEvents = "none"));
            animateSnake(0);
          };
          board.appendChild(cell);
          cellsArray.push(cell);
        }
      }

      function animateSnake(step) {
        if (step > 0)
          cellsArray[snakePath[step - 1]].classList.remove("highlight");
        if (step < snakePath.length) {
          cellsArray[snakePath[step]].classList.add("highlight");
          setTimeout(() => animateSnake(step + 1), 100);
        } else {
          modal.style.display = "flex";
        }
      }

      function startCylinderRotation() {
        modal.style.background = "black";
        modalInner.style.visibility = "hidden";
        movingBox.style.display = "block";
        movingBox.classList.add("spinning");
        movingBox.style.left = "50%";
        movingBox.style.top = "50%";
        movingBox.style.transform = "translate(-50%, -50%)";
        setTimeout(() => {
          glideAroundCylinder();
        }, 100);
      }

      function glideAroundCylinder() {
        movingBox.style.transition = "left 3s linear, top 3s ease-in-out";
        movingBox.style.left = "115%";
        movingBox.style.top = "45%";
        setTimeout(() => {
          movingBox.style.transition = "none";
          movingBox.style.left = "-15%";
          setTimeout(() => {
            movingBox.style.transition = "left 3s linear, top 3s ease-in-out";
            movingBox.style.left = "50%";
            movingBox.style.top = "50%";
            setTimeout(() => {
              movingBox.classList.remove("spinning");
              openBoxFinal();
            }, 3050);
          }, 50);
        }, 3000);
      }

      function openBoxFinal() {
        movingBox.classList.add("opening-box");
        setTimeout(() => {
          movingBox.style.display = "none";
          movingBox.classList.remove("opening-box");
          videoBg.style.opacity = "0";
          modal.style.background = "black";
          modalInner.style.visibility = "visible";
          showFinalResult();
        }, 1900);
      }

      function spawnParticles(type) {
        const icons = { "🍪": "cookiesgift.png", "☕": "coffeegift.png" };
        if (!icons[type]) return;
        const interval = setInterval(() => {
          if (modal.style.display === "none") {
            clearInterval(interval);
            return;
          }
          const p = document.createElement("div");
          p.className = "particle";
          p.style.backgroundImage = `url(${icons[type]})`;
          p.style.left = Math.random() * 100 + "vw";
          const sizeVal = Math.random() * 30 + 60;
          const size = sizeVal + "px";
          p.style.width = size;
          p.style.height = size;
          p.style.animationDuration = Math.random() * 2 + 3 + "s";
          fallingContainer.appendChild(p);
          setTimeout(() => p.remove(), 5000);
        }, 150);
      }

      function showFinalResult() {
        const res = pickReward();
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "flex";
        document.getElementById("rewardContent").innerHTML = `
            <h2 style="color:${res.color}; margin: 0 0 1.5vh 0; font-size: 3.5vh;">${res.text}</h2>
            <div style="background: radial-gradient(circle, rgba(211,47,47,0.2) 0%, transparent 70%); padding: 10px; border-radius: 50%;">
              <img src="${res.img}" class="reward-img">
            </div>
        `;
        if (res.particle) spawnParticles(res.particle);
      }
      createBoard();
    </script>
  </body>
</html>
